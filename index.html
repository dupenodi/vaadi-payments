<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cabin Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --border: #2a2a2a;
      --border2: #333;
      --text: #e8e6df;
      --muted: #777;
      --accent: #c8f060;
      --accent-dk: #9aba3c;
      --user-bg: #1e2a10;
      --user-border: #3a5018;
      --danger: #ff6b6b;
      --radius: 12px;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }

    .header h1 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .model-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border: 1px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      opacity: 0.7;
    }

    .status-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* Quick chips */
    .quick-bar {
      display: flex;
      gap: 6px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }

    .quick-bar::-webkit-scrollbar {
      display: none;
    }

    .chip {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border: 1px solid var(--border2);
      border-radius: 20px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200, 240, 96, 0.05);
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .msg.user .msg-label {
      text-align: right;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      color: #d4e8a0;
      align-self: flex-end;
      max-width: 85%;
    }

    .msg.bot .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      align-self: flex-start;
      max-width: 95%;
    }

    .msg.bot .bubble strong {
      color: var(--accent);
      font-weight: 500;
    }

    .msg.bot .bubble code {
      font-family: var(--mono);
      font-size: 12px;
      background: rgba(200, 240, 96, 0.08);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .msg.error .bubble {
      background: rgba(255, 107, 107, 0.08);
      border-color: rgba(255, 107, 107, 0.3);
      color: var(--danger);
    }

    /* Typing */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }

    .typing-bubble span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-bubble span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* Input */
    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      padding: 10px 14px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.15s;
      overflow-y: auto;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    textarea:focus {
      border-color: var(--accent);
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #0f0f0f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .send-btn:hover {
      background: var(--accent-dk);
      border-color: var(--accent-dk);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Empty state */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 40px;
    }

    .empty .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .empty .hint {
      font-size: 11px;
      opacity: 0.5;
      margin-top: 4px;
    }

    @media (max-width: 480px) {

      .header,
      .messages,
      .input-area,
      .quick-bar {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <header class="header">
      <div class="dot" id="dot"></div>
      <h1>Cabin Manager</h1>
      <div class="header-right">
        <span class="model-badge" id="modelBadge">—</span>
        <span class="status-text" id="statusText">ready</span>
      </div>
    </header>

    <div class="quick-bar">
      <button class="chip" onclick="q('List active bookings')">active bookings</button>
      <button class="chip" onclick="q('Add new booking')">+ new booking</button>
      <button class="chip" onclick="q('Show report for this month')">monthly report</button>
      <button class="chip" onclick="q('Add food charge')">+ food</button>
      <button class="chip" onclick="q('Add vehicle charge')">+ vehicle</button>
      <button class="chip" onclick="q('Record cash payment')">+ payment</button>
      <button class="chip" onclick="q('Mark guest as checked out')">check out</button>
      <button class="chip" onclick="q('List all transactions today')">today txns</button>
    </div>

    <div class="messages" id="messages">
      <div class="empty" id="emptyState">
        <div class="icon">🏔️</div>
        <div>cabin manager</div>
        <div class="hint">type a command or tap a shortcut above</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="e.g. Priya Sharma checked in today, 5 nights at ₹2500/night"
          onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5" />
            <polyline points="5 12 12 5 19 12" />
          </svg>
        </button>
      </div>
    </div>

  </div>
  <script>
    // ── CONFIG ────────────────────────────────────────────────────
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwTUaTrOr767gzApitgIA4qTgDjTrnt1JGBd8puAVRLu52YKlYk7CZRToCWZj98gyzT/exec';
    // ─────────────────────────────────────────────────────────────

    var chatHistory = [];
    var isLoading = false;

    function resize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function onKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    }

    function q(text) {
      document.getElementById('input').value = text;
      send();
    }

    function setStatus(state) {
      var dot = document.getElementById('dot');
      var txt = document.getElementById('statusText');
      if (state === 'thinking') {
        dot.style.background = '#facc15';
        dot.style.boxShadow = '0 0 8px #facc15';
        txt.textContent = 'thinking…';
      } else {
        dot.style.background = 'var(--accent)';
        dot.style.boxShadow = '0 0 8px var(--accent)';
        txt.textContent = 'ready';
      }
    }

    function addMsg(role, text, isError) {
      var wrap = document.getElementById('messages');
      var empty = document.getElementById('emptyState');
      if (empty) empty.remove();

      var div = document.createElement('div');
      div.className = 'msg ' + role + (isError ? ' error' : '');

      var label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'user' ? 'you' : 'assistant';

      var bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = fmt(text);

      div.appendChild(label);
      div.appendChild(bubble);
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    }

    function showTyping() {
      var wrap = document.getElementById('messages');
      var div = document.createElement('div');
      div.className = 'msg bot'; div.id = 'typing';
      var lbl = document.createElement('div');
      lbl.className = 'msg-label'; lbl.textContent = 'assistant';
      var bub = document.createElement('div');
      bub.className = 'bubble typing-bubble';
      bub.innerHTML = '<span></span><span></span><span></span>';
      div.appendChild(lbl); div.appendChild(bub);
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    }

    function removeTyping() {
      var el = document.getElementById('typing');
      if (el) el.remove();
    }

    function fmt(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    function send() {
      if (isLoading) return;
      var input = document.getElementById('input');
      var text = input.value.trim();
      if (!text) return;

      if (BACKEND_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
        addMsg('bot', 'Set your BACKEND_URL in the script first.\nOpen index.html and replace YOUR_APPS_SCRIPT_URL_HERE with your Apps Script deployment URL.', true);
        return;
      }

      input.value = ''; input.style.height = 'auto';
      isLoading = true;
      document.getElementById('sendBtn').disabled = true;
      setStatus('thinking');

      addMsg('user', text);
      chatHistory.push({ role: 'user', content: text });

      showTyping();

      var url = BACKEND_URL
        + '?payload=' + encodeURIComponent(JSON.stringify({ history: chatHistory }))
        + '&callback=__cb';

      var script = document.createElement('script');
      var done = false;

      window.__cb = function (data) {
        done = true;
        delete window.__cb;
        script.remove();
        removeTyping();

        if (data.ok && data.reply) {
          if (data.model) document.getElementById('modelBadge').textContent = data.model;
          addMsg('bot', data.reply);
          chatHistory.push({ role: 'assistant', content: data.reply });
          if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);
        } else {
          addMsg('bot', data.error || 'Something went wrong. Please try again.', true);
          chatHistory.pop();
        }

        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        setStatus('ready');
        document.getElementById('input').focus();
      };

      script.onerror = function () {
        if (done) return;
        delete window.__cb;
        script.remove();
        removeTyping();
        addMsg('bot', 'Could not reach backend.\n\nCheck your BACKEND_URL or internet connection.', true);
        chatHistory.pop();
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        setStatus('ready');
      };

      script.src = url;
      document.head.appendChild(script);
    }
  </script>
</body>

</html>
